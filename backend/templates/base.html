<!doctype html>
<html lang="es-AR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Calculadora de Bonos{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v={{ asset_v }}">
  <script>
    // Tiny pre-paint theme bootstrap. Reads the user's choice from
    // localStorage and writes data-theme BEFORE the page renders so we
    // don't flash the default. Keep this inline so it runs sync.
    (function () {
      try {
        var t = localStorage.getItem("yas_theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
</head>
<body hx-boost="false"
      x-data="{ railOpen: (function(){ try { return localStorage.getItem('fx_rail') !== '0'; } catch (e) { return true; } })() }">
  <header class="topbar" x-data="themeSwitcher()">
    <a class="brand" href="/yas">
      <svg class="brand-mark" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M12 3.6 L21.2 20.4 L2.8 20.4 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <span class="brand-text">Calculadora · Bonos</span>
    </a>
    <nav class="tabs">
      <a class="tab {% block tab_yas %}{% endblock %}" href="/yas">YAS</a>
      <a class="tab {% block tab_comparador %}{% endblock %}" href="/comparador">Comparador</a>
      <a class="tab {% block tab_curves %}{% endblock %}" href="/curves">Curvas</a>
      <a class="tab {% block tab_mercado %}{% endblock %}" href="/mercado">Mercado</a>
      <a class="tab {% block tab_dolares %}{% endblock %}" href="/dolares">Dólares</a>
      <a class="tab {% block tab_tasas %}{% endblock %}" href="/tasas">Tasas</a>
      <a class="tab {% block tab_posiciones %}{% endblock %}" href="/posiciones">Posiciones</a>
      <a class="tab {% block tab_matriz %}{% endblock %}" href="/matriz">Matriz</a>
      <a class="tab {% block tab_forwards %}{% endblock %}" href="/forwards">Forwards</a>
      <a class="tab {% block tab_futuros %}{% endblock %}" href="/futuros">Futuros</a>
      <a class="tab {% block tab_graficos %}{% endblock %}" href="/graficos">Gráficos</a>
      <a class="tab {% block tab_historicos %}{% endblock %}" href="/historicos">Históricos</a>
    </nav>
    <div class="topbar-meta">
      <button type="button" class="rail-toggle" :class="{ active: railOpen }"
              @click="railOpen = !railOpen; try { localStorage.setItem('fx_rail', railOpen ? '1' : '0'); } catch (e) {}"
              title="Mostrar/ocultar el monitor de dólar">💵</button>
      <div class="theme-switch" role="tablist" aria-label="Tema">
        <button type="button" role="tab" :aria-selected="theme==='dark'"  :class="{ active: theme==='dark'  }" @click="set('dark')"  title="Dark (Bloomberg)">Dark</button>
        <button type="button" role="tab" :aria-selected="theme==='light'" :class="{ active: theme==='light' }" @click="set('light')" title="Light">Light</button>
        <button type="button" role="tab" :aria-selected="theme==='delta'" :class="{ active: theme==='delta' }" @click="set('delta')" title="Delta">Delta</button>
      </div>
      <span class="phase-badge">Fase 1 · YAS</span>
    </div>
  </header>

  <div class="layout" :class="{ 'rail-closed': !railOpen }">
    <aside class="fx-rail" x-show="railOpen" x-cloak
           hx-get="/dolares/rail" hx-trigger="load, every 15s" hx-swap="innerHTML">
      <div class="muted" style="padding:12px;font-size:12px">Cargando dólar…</div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer class="footer">
    <span>FastAPI rewrite · sub-50 ms p95 target</span>
  </footer>

  <script>
    function themeSwitcher() {
      return {
        theme: (function () {
          try { return localStorage.getItem("yas_theme") || "dark"; }
          catch (e) { return "dark"; }
        })(),
        set(name) {
          this.theme = name;
          document.documentElement.setAttribute("data-theme", name);
          try { localStorage.setItem("yas_theme", name); } catch (e) {}
        },
      };
    }
  </script>

  <script src="{{ url_for('static', path='js/app.js') }}?v={{ asset_v }}" defer></script>
  <script src="{{ url_for('static', path='js/charts.js') }}?v={{ asset_v }}" defer></script>
</body>
</html>
