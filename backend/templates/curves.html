{% extends "base.html" %}
{% block title %}Curvas{% endblock %}
{% block tab_curves %}active{% endblock %}

{% block content %}
<section class="curves">
  <header class="yas-header">
    <h1>Curvas</h1>
    <p class="muted">Universo de bonos agrupado por curva. Live prices y TIREA por bono llegan en el próximo paso.</p>
  </header>

  <div class="curve-picker card">
    <div class="card-body">
      <label class="field">
        <span>Curva</span>
        <select
          name="curve"
          hx-get="/curves/table"
          hx-trigger="change"
          hx-target="#curve-table"
          hx-swap="innerHTML"
          hx-include="this"
        >
          {% for c in all_curves %}
            {% set count = (table.get(c.key) or []) | length %}
            <option value="{{ c.key }}" {% if c.key == selected_key %}selected{% endif %} {% if count == 0 %}disabled{% endif %}>
              {{ c.label }} {% if count %}({{ count }}){% endif %}
            </option>
          {% endfor %}
        </select>
      </label>
    </div>
  </div>

  <div id="curve-table">
    {% include "partials/curve_table.html" %}
  </div>
</section>
{% endblock %}
